name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-deploy:
    # Only deploy if the CI run that triggered us actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      deployments: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2.0.7
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          initial-status: in_progress
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/dhbw-memory:latest
            ghcr.io/${{ env.OWNER }}/dhbw-memory:${{ github.event.workflow_run.head_sha }}

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7 # TODO: pin to SHA — could not verify
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: /opt/dhbw-memory

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.1.0 # TODO: pin to SHA — could not verify
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/dhbw-memory
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull && docker compose up -d --remove-orphans && docker image prune -f

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2.0.3 # TODO: pin to SHA — could not verify
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          environment-url: https://memory.walletpulse.de

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2.0.3 # TODO: pin to SHA — could not verify
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure
          environment-url: https://memory.walletpulse.de
