<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="10" fill="#1a237e"/>
  <rect width="100" height="100" rx="10" fill="none" stroke="#3949ab" stroke-width="3"/>
  <!-- diamond grid pattern -->
  <g stroke="#3949ab" stroke-width="0.8" opacity="0.6">
    <line x1="0" y1="25" x2="25" y2="0"/><line x1="0" y1="50" x2="50" y2="0"/>
    <line x1="0" y1="75" x2="75" y2="0"/><line x1="0" y1="100" x2="100" y2="0"/>
    <line x1="25" y1="100" x2="100" y2="25"/><line x1="50" y1="100" x2="100" y2="50"/>
    <line x1="75" y1="100" x2="100" y2="75"/>
  </g>
  <text x="50" y="66" font-family="sans-serif" font-size="42" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.9">M</text>
