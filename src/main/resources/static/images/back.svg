<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Card surface: deep purple-navy bleeding into the app's #0b1326 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0a3e"/>
      <stop offset="55%"  stop-color="#16133a"/>
      <stop offset="100%" stop-color="#0b1326"/>
    </linearGradient>

    <!-- WalletPulse brand gradient (purple → cyan), used for the pulse line. -->
    <linearGradient id="brand" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#863bff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>

    <!-- Faint diagonal hatch — gives the back some texture without competing
         with the pulse line. -->
    <pattern id="grid" width="14" height="14"
             patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14"
            stroke="#863bff" stroke-width="0.5" opacity="0.18"/>
    </pattern>

    <!-- Soft halo behind the pulse line so it reads as a focal point. -->
    <radialGradient id="glow" cx="50%" cy="50%" r="48%">
      <stop offset="0%"  stop-color="#863bff" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Stacked fills: gradient → texture → glow. -->
  <rect width="100" height="100" rx="0" fill="url(#bg)"/>
  <rect width="100" height="100" rx="0" fill="url(#grid)"/>
  <rect width="100" height="100" rx="0" fill="url(#glow)"/>

  <!-- WalletPulse pulse mark — same shape as wp-icon.svg, scaled & centered. -->
  <polyline points="20,50 29,50 36,28 45,63 55,38 61,50 80,50"
            fill="none" stroke="url(#brand)" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark under the pulse. font-family stays generic because SVGs loaded
       as <img src=…> can't reach the page's Google-Fonts Inter. -->
  <text x="50" y="84"
        font-family="Helvetica, Arial, sans-serif"
        font-size="6.5" font-weight="700" letter-spacing="2.5"
        fill="#dae2fd" text-anchor="middle" opacity="0.6">DHBW MEMORY</text>
</svg>
