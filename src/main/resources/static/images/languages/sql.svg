<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sqlC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0C9D4"/>
      <stop offset="100%" stop-color="#7A8898"/>
    </linearGradient>
  </defs>
  <!-- bottom disc -->
  <ellipse cx="50" cy="80" rx="30" ry="8" fill="#4A5868"/>
  <!-- cylinder body -->
  <rect x="20" y="28" width="60" height="52" fill="url(#sqlC)"/>
  <!-- top discs -->
  <ellipse cx="50" cy="28" rx="30" ry="8" fill="#9AA8B8"/>
  <ellipse cx="50" cy="28" rx="30" ry="8" fill="none" stroke="#5A6878" stroke-width="1"/>
  <!-- middle stripe lines -->
  <ellipse cx="50" cy="46" rx="30" ry="8" fill="none" stroke="#5A6878" stroke-width="1" opacity="0.6"/>
  <ellipse cx="50" cy="62" rx="30" ry="8" fill="none" stroke="#5A6878" stroke-width="1" opacity="0.6"/>
  <!-- close cylinder bottom -->
  <path d="M20,28 L20,80 A30,8 0 0,0 80,80 L80,28" fill="none" stroke="#5A6878" stroke-width="1"/>
  <!-- glow gear hint -->
  <circle cx="78" cy="74" r="9" fill="#FFD54F"/>
  <circle cx="78" cy="74" r="4" fill="#7A8898"/>
  <g fill="#FFD54F">
    <rect x="76" y="62" width="4" height="4"/>
    <rect x="76" y="82" width="4" height="4"/>
    <rect x="66" y="72" width="4" height="4"/>
    <rect x="86" y="72" width="4" height="4"/>
  </g>
</svg>
