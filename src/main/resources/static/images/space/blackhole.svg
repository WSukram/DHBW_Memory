<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="acc" cx="50%" cy="50%" r="50%">
      <stop offset="20%" stop-color="black" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FF6F00" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#FFEB3B" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#FF6F00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- accretion disk: wide ellipse on tilt -->
  <ellipse cx="50" cy="50" rx="44" ry="14" fill="url(#acc)" transform="rotate(-12,50,50)"/>
  <ellipse cx="50" cy="50" rx="44" ry="14" fill="none" stroke="#FFEB3B" stroke-width="0.5" opacity="0.5" transform="rotate(-12,50,50)"/>
  <!-- photon ring -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.9"/>
  <!-- event horizon -->
  <circle cx="50" cy="50" r="16" fill="black"/>
  <!-- gravitational lensing arc above -->
  <path d="M 28,50 Q 50,30 72,50" fill="none" stroke="#FFE082" stroke-width="1.5" opacity="0.7"/>
</svg>