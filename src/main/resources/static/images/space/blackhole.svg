<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="acc" cx="50%" cy="50%" r="50%">
      <stop offset="20%" stop-color="#1B1B1B" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FF6F00" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#FFEB3B" stop-opacity="0.95"/>
      <stop offset="80%" stop-color="#FF6F00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- accretion disk: wide ellipse on tilt -->
  <ellipse cx="50" cy="50" rx="44" ry="14" fill="url(#acc)" transform="rotate(-12,50,50)"/>
  <ellipse cx="50" cy="50" rx="44" ry="14" fill="none" stroke="#FFC107" stroke-width="0.6" opacity="0.7" transform="rotate(-12,50,50)"/>

  <!-- photon ring -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="#FF9800" stroke-width="2.2"/>

  <!-- event horizon -->
  <circle cx="50" cy="50" r="16" fill="#0A0A0A"/>

  <!-- gravitational lensing arc above -->
  <path d="M 28,50 Q 50,30 72,50" fill="none" stroke="#FFB300" stroke-width="1.6" opacity="0.85"/>
</svg>
