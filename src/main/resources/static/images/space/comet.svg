<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
    <radialGradient id="cn" cx="38%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#01579B"/>
    </radialGradient>
    <radialGradient id="ccoma" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#81D4FA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ctail" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E1F5FE" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#4FC3F7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cion" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#B388FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#311B92" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>

  <!-- broad dust tail sweeping from nucleus toward bottom-left -->
  <path d="M 70,30 Q 56,40 36,62 Q 18,82 8,92 Q 26,76 50,52 Q 62,40 74,32 Z"
        fill="url(#ctail)" opacity="0.9"/>

  <!-- secondary, narrower ion tail (straighter, slightly offset, purple-blue) -->
  <path d="M 72,32 L 6,98 L 14,98 L 76,36 Z" fill="url(#cion)" opacity="0.7"/>

  <!-- fine gas streaks -->
  <g stroke="#E1F5FE" stroke-width="0.7" opacity="0.8" stroke-linecap="round">
    <line x1="68" y1="34" x2="20" y2="84"/>
    <line x1="64" y1="38" x2="14" y2="88"/>
    <line x1="60" y1="42" x2="10" y2="92"/>
    <line x1="58" y1="46" x2="22" y2="90"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="0.4" opacity="0.9" stroke-linecap="round">
    <line x1="66" y1="36" x2="24" y2="80"/>
    <line x1="62" y1="40" x2="18" y2="86"/>
  </g>

  <!-- coma glow -->
  <circle cx="72" cy="30" r="22" fill="url(#ccoma)"/>

  <!-- nucleus -->
  <circle cx="72" cy="30" r="9" fill="url(#cn)"/>
  <circle cx="69" cy="27" r="2.6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="74" cy="32" r="1" fill="#01579B" opacity="0.6"/>
</svg>
