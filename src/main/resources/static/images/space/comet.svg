<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="cn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="50%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#01579B"/>
    </radialGradient>
    <linearGradient id="ct" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B3E5FC" stop-opacity="0"/>
      <stop offset="50%" stop-color="#81D4FA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E1F5FE" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- broad tail -->
  <path d="M 12,84 Q 35,72 60,40 L 76,30 Q 60,52 30,84 Z" fill="url(#ct)"/>
  <!-- thin gas streaks -->
  <g stroke="#80DEEA" stroke-width="0.8" opacity="0.7" stroke-linecap="round">
    <line x1="16" y1="80" x2="60" y2="36"/>
    <line x1="22" y1="86" x2="58" y2="44"/>
    <line x1="14" y1="72" x2="64" y2="30"/>
    <line x1="28" y1="88" x2="62" y2="48"/>
  </g>
  <!-- nucleus with glow -->
  <circle cx="70" cy="30" r="16" fill="white" opacity="0.25"/>
  <circle cx="70" cy="30" r="11" fill="url(#cn)"/>
  <circle cx="68" cy="28" r="3" fill="white" opacity="0.7"/>
</svg>