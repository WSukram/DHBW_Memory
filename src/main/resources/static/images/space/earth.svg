  <!-- another continent shape -->
  <path d="M 28,42 Q 38,40 40,46 Q 38,52 32,54 Q 26,52 28,42Z" fill="#2E7D32"/>
  <!-- small island -->
  <ellipse cx="64" cy="58" rx="5" ry="3" fill="#388E3C" transform="rotate(20,64,58)"/>
  <!-- clouds -->
  <ellipse cx="36" cy="32" rx="8" ry="2.5" fill="white" opacity="0.6" transform="rotate(-15,36,32)"/>
  <ellipse cx="58" cy="68" rx="0" ry="2.5" fill="white" opacity="0.5" transform="rotate(10,58,68)"/>
</svg>