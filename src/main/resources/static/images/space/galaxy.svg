<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE082"/>
      <stop offset="55%"  stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#4527A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="garm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3949AB" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#5C6BC0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3949AB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="rotate(-25,50,50)">
    <!-- outer halo -->
    <ellipse cx="50" cy="50" rx="44" ry="16" fill="#5C6BC0" opacity="0.25"/>

    <!-- spiral arms -->
    <path d="M 14,52 Q 30,38 50,46 Q 68,52 78,38" fill="none"
          stroke="url(#garm)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 86,48 Q 70,62 50,54 Q 32,48 22,62" fill="none"
          stroke="url(#garm)" stroke-width="5" stroke-linecap="round"/>

    <!-- inner brighter strand on each arm -->
    <path d="M 18,50 Q 32,40 50,48 Q 66,54 74,42" fill="none"
          stroke="#B39DDB" stroke-width="1.4" opacity="0.85" stroke-linecap="round"/>
    <path d="M 82,50 Q 68,60 50,52 Q 34,46 26,60" fill="none"
          stroke="#B39DDB" stroke-width="1.4" opacity="0.85" stroke-linecap="round"/>

    <!-- scattered stars in arms -->
    <g fill="#5C6BC0">
      <circle cx="28" cy="48" r="1"/>
      <circle cx="42" cy="46" r="0.9"/>
      <circle cx="64" cy="48" r="1"/>
      <circle cx="36" cy="58" r="1"/>
      <circle cx="62" cy="56" r="0.9"/>
      <circle cx="74" cy="52" r="0.8"/>
    </g>

    <!-- bright core -->
    <ellipse cx="50" cy="50" rx="16" ry="9" fill="url(#gc)"/>
    <ellipse cx="50" cy="50" rx="6"  ry="3" fill="#FFF8E1"/>
  </g>
</svg>
