<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="40%" stop-color="#FFF59D"/>
      <stop offset="100%" stop-color="#7986CB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- outer halo -->
  <ellipse cx="50" cy="50" rx="42" ry="16" fill="#7986CB" opacity="0.15" transform="rotate(-25,50,50)"/>
  <!-- spiral arm 1 -->
  <path d="M 14,52 Q 30,38 50,46 Q 68,52 78,38" fill="none" stroke="#9FA8DA" stroke-width="4" opacity="0.5" transform="rotate(-25,50,50)"/>
  <path d="M 14,52 Q 30,38 50,46 Q 68,52 78,38" fill="none" stroke="white" stroke-width="1" opacity="0.4" transform="rotate(-25,50,50)"/>
  <!-- spiral arm 2 -->
  <path d="M 86,48 Q 70,62 50,54 Q 32,48 22,62" fill="none" stroke="#9FA8DA" stroke-width="4" opacity="0.5" transform="rotate(-25,50,50)"/>
  <path d="M 86,48 Q 70,62 50,54 Q 32,48 22,62" fill="none" stroke="white" stroke-width="1" opacity="0.4" transform="rotate(-25,50,50)"/>
  <!-- scattered stars in arms -->
  <g fill="white" transform="rotate(-25,50,50)">
    <circle cx="28" cy="48" r="0.8"/>
    <circle cx="42" cy="46" r="0.7"/>
    <circle cx="64" cy="48" r="0.8"/>
    <circle cx="36" cy="58" r="0.8"/>
    <circle cx="62" cy="56" r="0.7"/>
    <circle cx="74" cy="52" r="0.6"/>
  </g>
  <!-- bright core -->
  <ellipse cx="50" cy="50" rx="14" ry="8" fill="url(#gc)" transform="rotate(-25,50,50)"/>
  <circle cx="50" cy="50" r="3" fill="white"/>
</svg>