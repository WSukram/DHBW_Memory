<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="0" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="jp" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="60%" stop-color="#D4A85A"/>
      <stop offset="100%" stop-color="#5D3A0F"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="34" fill="url(#jp)"/>
  <!-- atmospheric bands via clipped ellipses -->
  <clipPath id="jc"><circle cx="50" cy="50" r="34"/></clipPath>
  <g clip-path="url(#jc)">
    <ellipse cx="50" cy="28" rx="34" ry="2.5" fill="#A8702B" opacity="0.5"/>
    <ellipse cx="50" cy="36" rx="34" ry="3.5" fill="#C19250" opacity="0.5"/>
    <ellipse cx="50" cy="44" rx="34" ry="3" fill="#8B5A1F" opacity="0.6"/>
    <ellipse cx="50" cy="56" rx="34" ry="4" fill="#A8702B" opacity="0.5"/>
    <ellipse cx="50" cy="64" rx="34" ry="3" fill="#7A4F1A" opacity="0.6"/>
    <ellipse cx="50" cy="72" rx="34" ry="2.5" fill="#C19250" opacity="0.4"/>
    <!-- great red spot -->
    <ellipse cx="62" cy="56" rx="9" ry="5" fill="#C2410C" opacity="0.95"/>
    <ellipse cx="62" cy="56" rx="6" ry="3" fill="#7C2D12" opacity="0.5"/>
  </g>
</svg>