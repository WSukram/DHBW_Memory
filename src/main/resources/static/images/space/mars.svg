<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mp" cx="35%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#FF7043"/>
      <stop offset="50%" stop-color="#D84315"/>
      <stop offset="100%" stop-color="#5D1A0A"/>
    </radialGradient>
    <clipPath id="mpc"><circle cx="50" cy="50" r="32"/></clipPath>
  </defs>

  <!-- planet -->
  <circle cx="50" cy="50" r="32" fill="url(#mp)"/>

  <g clip-path="url(#mpc)">
    <!-- surface features -->
    <ellipse cx="40" cy="42" rx="7" ry="5" fill="#8B2E0F" opacity="0.65" transform="rotate(-20,40,42)"/>
    <ellipse cx="60" cy="56" rx="7" ry="4" fill="#8B2E0F" opacity="0.55" transform="rotate(15,60,56)"/>
    <ellipse cx="45" cy="60" rx="5" ry="3" fill="#A8390F" opacity="0.55"/>
    <!-- polar caps -->
    <ellipse cx="50" cy="24" rx="9" ry="4" fill="#FAFAFA" opacity="0.95"/>
    <ellipse cx="50" cy="76" rx="6" ry="3" fill="#FAFAFA" opacity="0.85"/>
  </g>
</svg>
