<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
    <radialGradient id="mt" cx="32%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="55%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#1B0F0A"/>
    </radialGradient>
    <radialGradient id="mhead" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF59D" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#FF9800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF5722" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mtail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFC107" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#FF5722" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E64A19" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>

  <!-- long fiery trail, tapering toward upper-left -->
  <path d="M 4,8 Q 30,28 60,56 Q 36,30 12,18 Z" fill="url(#mtail)" opacity="0.85"/>
  <path d="M 8,4 Q 34,24 64,52 Q 42,24 18,12 Z" fill="url(#mtail)" opacity="0.5"/>

  <!-- bright streak lines -->
  <g stroke="#FFD54F" stroke-width="1" opacity="0.85" stroke-linecap="round">
    <line x1="10" y1="14" x2="56" y2="52"/>
    <line x1="16" y1="8"  x2="60" y2="48"/>
    <line x1="6"  y1="22" x2="50" y2="56"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="0.6" opacity="0.7" stroke-linecap="round">
    <line x1="12" y1="12" x2="58" y2="50"/>
    <line x1="20" y1="6"  x2="56" y2="44"/>
  </g>

  <!-- heat halo around leading edge -->
  <circle cx="66" cy="60" r="20" fill="url(#mhead)"/>

  <!-- jagged rock body -->
  <path d="M 56,46 L 68,42 L 80,46 L 86,58 L 82,72 L 70,80 L 56,78 L 48,68 L 50,56 Z"
        fill="url(#mt)" stroke="#1B0F0A" stroke-width="0.6"/>

  <!-- glowing molten leading edge -->
  <path d="M 50,56 L 56,46 L 68,42 L 80,46 L 86,58"
        fill="none" stroke="#FFB300" stroke-width="1.5" opacity="0.85" stroke-linecap="round"/>
  <path d="M 52,52 L 60,46 L 72,44 L 82,50"
        fill="none" stroke="#FFF176" stroke-width="0.8" opacity="0.9" stroke-linecap="round"/>

  <!-- craters -->
  <ellipse cx="66" cy="58" rx="5" ry="4.2" fill="#2E1A12"/>
  <ellipse cx="66.5" cy="57.2" rx="4" ry="3.2" fill="#3E2723"/>
  <ellipse cx="65" cy="56" rx="1.3" ry="0.9" fill="#8D6E63" opacity="0.7"/>

  <circle cx="76" cy="66" r="3" fill="#2E1A12"/>
  <circle cx="76.4" cy="65.6" r="2.2" fill="#4E342E"/>

  <circle cx="60" cy="68" r="2" fill="#2E1A12"/>
  <circle cx="60.3" cy="67.7" r="1.4" fill="#4E342E"/>

  <!-- sparks trailing off -->
  <circle cx="38" cy="38" r="1" fill="#FFD54F" opacity="0.9"/>
  <circle cx="30" cy="46" r="0.8" fill="#FF9800" opacity="0.8"/>
  <circle cx="44" cy="30" r="0.7" fill="#FFEB3B" opacity="0.8"/>
  <circle cx="24" cy="34" r="0.6" fill="#FF7043" opacity="0.7"/>
</svg>
