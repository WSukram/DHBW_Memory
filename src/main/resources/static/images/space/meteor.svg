<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="mt" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="60%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#1B1B1B"/>
    </radialGradient>
    <linearGradient id="mfl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF9800" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF5722" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- entry trail / glow -->
  <path d="M 8,12 Q 30,32 50,46 Q 35,30 14,18 Z" fill="url(#mfl)" opacity="0.6"/>
  <g stroke="#FF9800" stroke-width="1.5" opacity="0.7" stroke-linecap="round">
    <line x1="14" y1="20" x2="48" y2="48"/>
    <line x1="20" y1="14" x2="52" y2="44"/>
    <line x1="10" y1="26" x2="44" y2="52"/>
  </g>
  <!-- rocky asteroid -->
  <path d="M 50,42 L 70,40 L 82,52 L 78,68 L 62,76 L 46,68 L 44,52 Z" fill="url(#mt)"/>
  <!-- craters -->
  <circle cx="62" cy="54" r="4.5" fill="#3E2723" opacity="0.7"/>
  <circle cx="62" cy="54" r="3" fill="#1B1B1B" opacity="0.8"/>
  <circle cx="72" cy="62" r="3" fill="#3E2723" opacity="0.7"/>
  <circle cx="54" cy="62" r="2" fill="#3E2723" opacity="0.6"/>
  <!-- leading-edge glow -->
  <path d="M 50,42 L 70,40 L 82,52" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.7"/>
</svg>