  <circle cx="50" cy="48" r="2.2" fill="#FFFFFF"/>
  <circle cx="38" cy="38" r="5" fill="url(#nstar)"/>
  <circle cx="38" cy="38" r="1.4" fill="#FFFFFF"/>
  <circle cx="64" cy="56" r="3" fill="url(#nstar)"/>
