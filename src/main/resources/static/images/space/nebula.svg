<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E91E63" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E91E63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7B1FA2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7B1FA2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0288D1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0288D1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb4" cx="50%" cy="50%" r="50%">
