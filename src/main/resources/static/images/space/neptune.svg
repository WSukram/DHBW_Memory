<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="np" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0A1A4D"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="32" fill="url(#np)"/>
  <clipPath id="npc"><circle cx="50" cy="50" r="32"/></clipPath>
  <g clip-path="url(#npc)">
    <!-- atmospheric bands -->
    <ellipse cx="50" cy="40" rx="32" ry="2.5" fill="#0D47A1" opacity="0.5"/>
    <ellipse cx="50" cy="60" rx="32" ry="2" fill="#0D47A1" opacity="0.4"/>
    <ellipse cx="50" cy="70" rx="32" ry="2.5" fill="#0D47A1" opacity="0.5"/>
    <!-- great dark spot -->
    <ellipse cx="58" cy="52" rx="9" ry="5" fill="#0A1A4D" opacity="0.85"/>
    <ellipse cx="58" cy="52" rx="6" ry="3" fill="#050D33" opacity="0.5"/>
    <!-- bright cloud streak -->
    <ellipse cx="38" cy="46" rx="8" ry="1.5" fill="white" opacity="0.4"/>
  </g>
</svg>