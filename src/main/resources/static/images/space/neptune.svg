<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="np" cx="35%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#64B5F6"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0A1A4D"/>
    </radialGradient>
    <clipPath id="npc"><circle cx="50" cy="50" r="32"/></clipPath>
  </defs>

  <circle cx="50" cy="50" r="32" fill="url(#np)"/>

  <g clip-path="url(#npc)">
    <!-- atmospheric bands -->
    <ellipse cx="50" cy="40" rx="32" ry="2.5" fill="#0D47A1" opacity="0.55"/>
    <ellipse cx="50" cy="60" rx="32" ry="2"   fill="#0D47A1" opacity="0.45"/>
    <ellipse cx="50" cy="70" rx="32" ry="2.5" fill="#0D47A1" opacity="0.55"/>
    <!-- great dark spot -->
    <ellipse cx="58" cy="52" rx="9" ry="5" fill="#0A1A4D"/>
    <ellipse cx="58" cy="52" rx="6" ry="3" fill="#050D33" opacity="0.7"/>
    <!-- bright cloud streak -->
    <ellipse cx="38" cy="46" rx="8" ry="1.5" fill="#FFFFFF" opacity="0.5"/>
  </g>
</svg>
