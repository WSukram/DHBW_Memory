<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <linearGradient id="sp1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="sb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#90A4AE"/>
    </linearGradient>
  </defs>
  <!-- solar panels left -->
  <rect x="6"  y="42" width="30" height="16" rx="2" fill="url(#sp1)" stroke="#90CAF9" stroke-width="0.8"/>
  <line x1="13" y1="42" x2="13" y2="58" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="21" y1="42" x2="21" y2="58" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="29" y1="42" x2="29" y2="58" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="6" y1="50" x2="36" y2="50" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- solar panels right -->
  <rect x="64" y="42" width="30" height="16" rx="2" fill="url(#sp1)" stroke="#90CAF9" stroke-width="0.8"/>
  <line x1="71" y1="42" x2="71" y2="58" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="79" y1="42" x2="79" y2="58" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="87" y1="42" x2="87" y2="58" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="64" y1="50" x2="94" y2="50" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- body -->
  <rect x="38" y="38" width="24" height="24" rx="3" fill="url(#sb)" stroke="#546E7A" stroke-width="1"/>
  <rect x="42" y="44" width="6" height="6" fill="#1565C0"/>
  <rect x="52" y="44" width="6" height="6" fill="#1565C0"/>
  <!-- dish on top -->
  <ellipse cx="50" cy="28" rx="11" ry="5" fill="none" stroke="#CFD8DC" stroke-width="1.5"/>
  <ellipse cx="50" cy="28" rx="7" ry="3" fill="#37474F" opacity="0.4"/>
  <line x1="50" y1="28" x2="50" y2="38" stroke="#CFD8DC" stroke-width="1.5"/>
  <!-- antenna -->
  <line x1="50" y1="62" x2="50" y2="72" stroke="#CFD8DC" stroke-width="1"/>
  <circle cx="50" cy="73" r="1.5" fill="#F44336"/>
</svg>