<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="sp" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="60%" stop-color="#D4A85A"/>
      <stop offset="100%" stop-color="#7B5E2E"/>
    </radialGradient>
    <linearGradient id="srg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8D6E2C" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#D4A85A" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#D4A85A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8D6E2C" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- back half of ring -->
  <path d="M 8,52 A 42,11 0 0 1 92,52" fill="none" stroke="url(#srg)" stroke-width="4"/>
  <ellipse cx="50" cy="52" rx="40" ry="9" fill="none" stroke="#FFE082" stroke-width="1.5" stroke-dasharray="2 1" opacity="0.4"/>
  <!-- planet -->
  <circle cx="50" cy="50" r="22" fill="url(#sp)"/>
  <!-- bands -->
  <ellipse cx="50" cy="44" rx="22" ry="3" fill="#A8843B" opacity="0.4"/>
  <ellipse cx="50" cy="54" rx="22" ry="2" fill="#A8843B" opacity="0.3"/>
  <!-- front half of ring -->
  <path d="M 12,55 A 42,11 0 0 0 88,55" fill="none" stroke="url(#srg)" stroke-width="6"/>
  <path d="M 16,57 A 38,9 0 0 0 84,57" fill="none" stroke="#FFE082" stroke-width="1" opacity="0.6"/>
</svg>