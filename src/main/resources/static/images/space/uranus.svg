<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="up" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="60%" stop-color="#4DD0E1"/>
      <stop offset="100%" stop-color="#006064"/>
    </radialGradient>
  </defs>
  <!-- vertical rings (Uranus tilted on its side) -->
  <ellipse cx="50" cy="50" rx="10" ry="42" fill="none" stroke="#80DEEA" stroke-width="3" opacity="0.7"/>
  <ellipse cx="50" cy="50" rx="14" ry="42" fill="none" stroke="#26C6DA" stroke-width="1.5" opacity="0.5"/>
  <!-- planet -->
  <circle cx="50" cy="50" r="22" fill="url(#up)"/>
  <!-- subtle band -->
  <ellipse cx="50" cy="50" rx="22" ry="3" fill="#0097A7" opacity="0.3"/>
</svg>