<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
    <radialGradient id="up" cx="38%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="45%" stop-color="#80DEEA"/>
      <stop offset="85%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#004D40"/>
    </radialGradient>
    <linearGradient id="urg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#80DEEA" stop-opacity="0.2"/>
      <stop offset="45%"  stop-color="#B2EBF2" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#B2EBF2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#80DEEA" stop-opacity="0.2"/>
    </linearGradient>
    <clipPath id="upclip"><circle cx="50" cy="50" r="22"/></clipPath>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>

  <!-- back half of ring (tilted nearly vertical) -->
  <path d="M 50,8 A 11,42 0 0 1 50,92" fill="none" stroke="url(#urg)" stroke-width="4"/>
  <path d="M 50,10 A 9,40 0 0 1 50,90" fill="none" stroke="#E0F7FA" stroke-width="1" opacity="0.5"/>

  <!-- planet -->
  <circle cx="50" cy="50" r="22" fill="url(#up)"/>

  <!-- subtle atmospheric bands -->
  <g clip-path="url(#upclip)">
    <ellipse cx="50" cy="44" rx="22" ry="2.5" fill="#4DD0E1" opacity="0.25"/>
    <ellipse cx="50" cy="50" rx="22" ry="2"   fill="#26C6DA" opacity="0.2"/>
    <ellipse cx="50" cy="56" rx="22" ry="2.5" fill="#00ACC1" opacity="0.25"/>
    <!-- soft highlight -->
    <ellipse cx="42" cy="40" rx="6" ry="4" fill="#FFFFFF" opacity="0.18"/>
  </g>

  <!-- front half of ring (passes over planet) -->
  <path d="M 50,92 A 11,42 0 0 1 50,8" fill="none" stroke="url(#urg)" stroke-width="5" opacity="0.95"/>
  <path d="M 50,88 A 9,38 0 0 1 50,12" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>

  <!-- moon -->
  <circle cx="84" cy="48" r="1.6" fill="#B0BEC5"/>
</svg>
