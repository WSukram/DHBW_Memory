<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a2847"/>
      <stop offset="100%" stop-color="#050912"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- faint stars -->
  <circle cx="14" cy="16" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="86" cy="22" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="10" cy="78" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="88" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="78" cy="12" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="90" r="0.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="vp" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="60%" stop-color="#F9A825"/>
      <stop offset="100%" stop-color="#5D3A0F"/>
    </radialGradient>
  </defs>
  <!-- thick atmosphere glow -->
  <circle cx="50" cy="50" r="36" fill="#F9A825" opacity="0.25"/>
  <circle cx="50" cy="50" r="32" fill="url(#vp)"/>
  <!-- swirling cloud bands -->
  <clipPath id="vpc"><circle cx="50" cy="50" r="32"/></clipPath>
  <g clip-path="url(#vpc)" opacity="0.5">
    <path d="M 18,38 Q 50,32 82,40" fill="none" stroke="#E68B0F" stroke-width="3"/>
    <path d="M 18,52 Q 50,46 82,54" fill="none" stroke="#E68B0F" stroke-width="2.5"/>
    <path d="M 18,66 Q 50,60 82,68" fill="none" stroke="#E68B0F" stroke-width="3"/>
    <path d="M 18,72 Q 50,68 82,76" fill="none" stroke="#E68B0F" stroke-width="2"/>
  </g>
</svg>